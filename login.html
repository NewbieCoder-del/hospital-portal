<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CareConnect Bangalore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="doctor-search.html">Find Doctor</a>
      <a href="hospitals.html">Hospitals</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="records.html">Records</a>
    </nav>
  </header>
  <main id="main-content">
    <section class="hero card">
      <div class="hero-content">
        <p class="section-label">Login</p>
        <h1>Log in to your healthcare account</h1>
        <p class="hero-subtitle">Stay signed in and book appointments faster.</p>
      </div>
    </section>
    <section class="search-section card" aria-labelledby="login-page-title">
      <div class="section-heading">
        <p class="section-label">Authentication</p>
        <h2 id="login-page-title">Patient login</h2>
      </div>
      <form class="search-panel" id="login-form">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="login-phone">Phone Number</label>
            <input id="login-phone" type="tel" placeholder="Enter phone number" required>
          </div>
          <div class="form-group full-width">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter password" required>
          </div>
          <div class="form-group full-width">
            <button type="submit">Log In</button>
          </div>
          <div class="form-group full-width">
            <p class="help-text" id="auth-status">Not logged in.</p>
          </div>
        </div>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="tel:+918045678900">Contact</a>
      <a href="help.html">Help</a>
      <a href="privacy.html">Privacy</a>
    </nav>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
