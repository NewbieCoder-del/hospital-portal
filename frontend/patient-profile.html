<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile | CareConnect Bangalore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="doctor-search.html">Find Doctor</a>
      <a href="hospitals.html">Hospitals</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="records.html">Records</a>
    </nav>
  </header>
  <main id="main-content">
    <section class="hero card">
      <div class="hero-content">
        <p class="section-label">Patient profile</p>
        <h1>Your patient profile</h1>
        <p class="hero-subtitle">Save personal and medical details once to reduce typing during booking.</p>
      </div>
    </section>
    <section class="search-section card" aria-labelledby="profile-page-title">
      <div class="section-heading">
        <p class="section-label">Profile details</p>
        <h2 id="profile-page-title">Update patient information</h2>
      </div>
      <form class="search-panel" id="patient-profile-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="profile-name">Name</label>
            <input id="profile-name" type="text" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label for="profile-age">Age</label>
            <input id="profile-age" type="number" min="1" max="120" placeholder="Enter age">
          </div>
          <div class="form-group">
            <label for="profile-phone">Phone</label>
            <input id="profile-phone" type="tel" placeholder="Enter phone number" required>
          </div>
          <div class="form-group">
            <label for="profile-email">Email</label>
            <input id="profile-email" type="email" placeholder="Enter email">
          </div>
          <div class="form-group full-width">
            <label for="profile-medical-history">Medical history</label>
            <textarea id="profile-medical-history" placeholder="Example: BP, diabetes, heart history"></textarea>
          </div>
          <div class="form-group full-width">
            <label for="profile-medical-notes">Medical notes</label>
            <textarea id="profile-medical-notes" placeholder="Current notes or symptoms"></textarea>
          </div>
          <div class="form-group full-width">
            <label for="profile-insurance">Insurance information</label>
            <textarea id="profile-insurance" placeholder="Insurance provider and policy number"></textarea>
          </div>
          <div class="form-group full-width">
            <button type="submit">Save Profile</button>
          </div>
          <div class="form-group full-width">
            <p class="help-text" id="profile-page-status">Please log in to load your profile.</p>
          </div>
        </div>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="tel:+918045678900">Contact</a>
      <a href="help.html">Help</a>
      <a href="privacy.html">Privacy</a>
    </nav>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
