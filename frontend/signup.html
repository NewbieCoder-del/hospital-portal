<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | CareConnect Bangalore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="doctor-search.html">Find Doctor</a>
      <a href="hospitals.html">Hospitals</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="records.html">Records</a>
    </nav>
  </header>
  <main id="main-content">
    <section class="hero card">
      <div class="hero-content">
        <p class="section-label">Signup</p>
        <h1>Create your patient account</h1>
        <p class="hero-subtitle">Register once and reuse your information for faster booking.</p>
      </div>
    </section>
    <section class="search-section card" aria-labelledby="signup-page-title">
      <div class="section-heading">
        <p class="section-label">Authentication</p>
        <h2 id="signup-page-title">Patient signup</h2>
      </div>
      <form class="search-panel" id="register-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="register-name">Name</label>
            <input id="register-name" type="text" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label for="register-phone">Phone Number</label>
            <input id="register-phone" type="tel" placeholder="Enter phone number" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input id="register-email" type="email" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label for="register-age">Age</label>
            <input id="register-age" type="number" min="1" max="120" placeholder="Enter age">
          </div>
          <div class="form-group full-width">
            <label for="register-password">Password</label>
            <input id="register-password" type="password" placeholder="Create password" required>
          </div>
          <div class="form-group full-width">
            <label for="register-notes">Medical notes</label>
            <textarea id="register-notes" placeholder="Example: Diabetes, BP, allergies"></textarea>
          </div>
          <div class="form-group full-width">
            <button type="submit">Create Account</button>
          </div>
          <div class="form-group full-width">
            <p class="help-text" id="auth-status">Not signed up yet.</p>
          </div>
        </div>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="tel:+918045678900">Contact</a>
      <a href="help.html">Help</a>
      <a href="privacy.html">Privacy</a>
    </nav>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
